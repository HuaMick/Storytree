    <path d="M196,344 L196,318 A12,14 0 0 1 220,318 L220,344 Z" fill="url(#forest-windmill-window)" opacity="0.9"/>
    <path d="M208,318 L208,344" stroke="#8a5a2a" stroke-width="1.2" opacity="0.6"/>
    <ellipse cx="208" cy="348" rx="26" ry="7" fill="#ffd75e" opacity="0.22" filter="url(#forest-windmill-blur2)"/>
    <path d="M190,306 A18,10 0 0 1 226,306" fill="none" stroke="#6b4326" stroke-width="2.4"/>
  </g>

  <!-- ===================== GLOWING WINDOWS ===================== -->
  <!-- lower-right arched window -->
  <ellipse cx="272" cy="262" rx="30" ry="30" fill="url(#forest-windmill-winglow)" filter="url(#forest-windmill-blur2)"/>
  <g>
    <path d="M261,278 L261,252 A11,13 0 0 1 283,252 L283,278 Z" fill="#3a2a1c"/>
    <path d="M263,277 L263,253 A9,11 0 0 1 281,253 L281,277 Z" fill="url(#forest-windmill-window)"/>
    <line x1="272" y1="243" x2="272" y2="277" stroke="#7a4e28" stroke-width="1.4"/>
    <line x1="263" y1="262" x2="281" y2="262" stroke="#7a4e28" stroke-width="1.4"/>
  </g>
  <!-- upper window -->
  <ellipse cx="266" cy="204" rx="22" ry="22" fill="url(#forest-windmill-winglow)" filter="url(#forest-windmill-blur2)"/>
  <g>
    <path d="M258,216 L258,198 A8,9 0 0 1 274,198 L274,216 Z" fill="#3a2a1c"/>
    <path d="M260,215 L260,199 A6,7 0 0 1 272,199 L272,215 Z" fill="url(#forest-windmill-window)"/>
    <line x1="266" y1="191" x2="266" y2="215" stroke="#7a4e28" stroke-width="1.2"/>
  </g>
  <!-- small left window (moved clear of the balcony band and the lower sail's sweep) -->
  <ellipse cx="155.5" cy="302" rx="17" ry="17" fill="url(#forest-windmill-winglow)" filter="url(#forest-windmill-blur2)"/>
  <g>
    <rect x="148" y="292" width="15" height="19" rx="3" fill="#2f2116"/>
    <rect x="150" y="294" width="11" height="15" rx="2" fill="url(#forest-windmill-window)" opacity="0.92"/>
    <line x1="155.5" y1="294" x2="155.5" y2="309" stroke="#7a4e28" stroke-width="1"/>
  </g>

  <!-- ===================== BALCONY ===================== -->
  <!-- ring flush to the tower cross-section at this level; posts seated ON the deck's front dip, -->
  <!-- hand-rail = the deck arc raised 17 (was an up-bulging arc floating above the posts) -->
  <g transform="translate(15.75,16.52) scale(0.93)">
    <!-- balcony deck ring -->
    <path d="M138,236 A87,34 0 0 0 312,236 L312,247 A87,34 0 0 1 138,247 Z" fill="url(#forest-windmill-balc)"/>
    <path d="M138,236 A87,34 0 0 0 312,236 A79,30 0 0 1 138,236 Z" fill="#7d5238"/>
    <path d="M138,236 A87,34 0 0 0 312,236 A79,30 0 0 1 138,236 Z" fill="#3a2416" opacity="0.35"/>
    <!-- support brackets hung from the band's bottom edge -->
    <path d="M150,262 l6,13 6,-10 z" fill="#4a2f1e"/>
    <path d="M216,278 l6,14 6,-11 z" fill="#4a2f1e"/>
    <path d="M290,266 l6,13 6,-10 z" fill="#4a2f1e"/>
    <!-- railing -->
    <path d="M140,236 A85,33 0 0 0 310,236" fill="none" stroke="#8a5a3c" stroke-width="3"/>
    <g stroke="#6b4228" stroke-width="2.4">
      <line x1="150" y1="255" x2="150" y2="237"/>
      <line x1="173" y1="265" x2="173" y2="247"/>
      <line x1="198" y1="270" x2="198" y2="252"/>
      <line x1="225" y1="272" x2="225" y2="254"/>
      <line x1="252" y1="270" x2="252" y2="252"/>
      <line x1="277" y1="265" x2="277" y2="247"/>
      <line x1="300" y1="255" x2="300" y2="237"/>
    </g>
    <path d="M138,219 A87,34 0 0 0 312,219" fill="none" stroke="#9a6748" stroke-width="2.6"/>
  </g>

  <!-- ===================== CAP / DOME ===================== -->
  <g>
    <ellipse cx="225" cy="152" rx="70" ry="27" fill="#2a3d47"/>
    <path d="M155,150 C158,104 190,86 225,86 C260,86 292,104 295,150 A70,26 0 0 1 155,150 Z" fill="url(#forest-windmill-cap)"/>
    <!-- dome shading -->
    <path d="M225,86 C260,86 292,104 295,150 A70,26 0 0 1 246,168 C266,150 264,110 245,92 C238,88 231,86 225,86 Z" fill="#274c60" opacity="0.55"/>
    <path d="M225,86 C205,88 182,102 170,128 C176,112 194,94 216,89 C219,88 222,87 225,86 Z" fill="#9fcada" opacity="0.6"/>
    <!-- ribs -->
    <path d="M225,86 L225,150" stroke="#2b4f63" stroke-width="1.3" opacity="0.5"/>
    <path d="M192,90 C182,110 176,130 175,150" fill="none" stroke="#2b4f63" stroke-width="1.1" opacity="0.4"/>
    <path d="M258,90 C268,110 274,130 275,150" fill="none" stroke="#2b4f63" stroke-width="1.1" opacity="0.4"/>
    <!-- cap rim band -->
    <path d="M155,150 A70,26 0 0 0 295,150 L295,156 A70,27 0 0 1 155,156 Z" fill="#3a2416"/>
    <!-- rim highlight: front arc only (the full ellipse drew its back half across the dome) -->
    <path d="M155,150 A70,26 0 0 0 295,150" fill="none" stroke="#8a5a3c" stroke-width="1.6" opacity="0.7"/>
    <!-- finial -->
    <line x1="225" y1="86" x2="225" y2="66" stroke="#5a3c26" stroke-width="2.6"/>
    <circle cx="225" cy="63" r="5" fill="#c2b280"/>
    <circle cx="223" cy="61" r="2" fill="#ffe9a8"/>
    <!-- little pennant -->
    <path d="M225,66 L246,71 L227,78 Z" fill="#5d8fa8"/>
  </g>

  <!-- ===================== SAILS ===================== -->
  <!-- soft shadow the rotor casts on the tower/cap (depth cue: rotor sits in FRONT) -->
  <ellipse cx="212" cy="184" rx="22" ry="26" fill="#0b1015" opacity="0.22" filter="url(#forest-windmill-soft)"/>
  <!-- soft shadow the right sail casts onto the lit window below its edge (in-front depth cue) -->
  <path d="M258,208 q11,7 22,4" fill="none" stroke="#0c1015" stroke-width="6" stroke-linecap="round" opacity="0.28" filter="url(#forest-windmill-blur2)"/>

  <g transform="rotate(16 200 168)">
    <!-- ARM 1 (up) -->
    <g transform="rotate(0 200 168)">
      <path d="M200,58 C214,62 223,77 223,93 L223,146 C223,157 210,164 200,165 Z" fill="url(#forest-windmill-sail)" opacity="0.5"/>
