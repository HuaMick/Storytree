<svg viewBox="0 0 480 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="forest-windmill-grass" cx="42%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#6fb877"/>
      <stop offset="55%" stop-color="#4f9d5d"/>
      <stop offset="100%" stop-color="#357a48"/>
    </radialGradient>
    <linearGradient id="forest-windmill-earth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a5340"/>
      <stop offset="100%" stop-color="#452e22"/>
    </linearGradient>
    <linearGradient id="forest-windmill-tower" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8497a3"/>
      <stop offset="26%" stop-color="#7c93a0"/>
      <stop offset="52%" stop-color="#5d7885"/>
      <stop offset="78%" stop-color="#425964"/>
      <stop offset="100%" stop-color="#2f414b"/>
    </linearGradient>
    <linearGradient id="forest-windmill-towerwarm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd75e" stop-opacity="0"/>
      <stop offset="60%" stop-color="#ffcf6a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffbf4d" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="forest-windmill-cap" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7fb2c9"/>
      <stop offset="45%" stop-color="#5d8fa8"/>
      <stop offset="100%" stop-color="#345d73"/>
    </linearGradient>
    <linearGradient id="forest-windmill-balc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a6848"/>
      <stop offset="100%" stop-color="#5c3a28"/>
    </linearGradient>
    <linearGradient id="forest-windmill-wood" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a06844"/>
      <stop offset="100%" stop-color="#6b4230"/>
    </linearGradient>
    <linearGradient id="forest-windmill-sail" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe9a8"/>
      <stop offset="100%" stop-color="#e8c885"/>
    </linearGradient>
    <radialGradient id="forest-windmill-window" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#fff6cf"/>
      <stop offset="45%" stop-color="#ffd75e"/>
      <stop offset="100%" stop-color="#e79a2c"/>
    </radialGradient>
    <radialGradient id="forest-windmill-winglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe9a8" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#ffd75e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffd75e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="forest-windmill-hub" cx="42%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#b98a5f"/>
      <stop offset="100%" stop-color="#4f3222"/>
    </radialGradient>
    <radialGradient id="forest-windmill-mote" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4c8" stop-opacity="1"/>
      <stop offset="45%" stop-color="#ffd75e" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffd75e" stop-opacity="0"/>
    </radialGradient>
    <filter id="forest-windmill-soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="forest-windmill-blur2" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
  </defs>

  <!-- ground contact shadow -->
  <ellipse cx="240" cy="392" rx="182" ry="50" fill="#000000" opacity="0.55" filter="url(#forest-windmill-soft)"/>

  <!-- ===================== GROUND TILE (2:1 iso diamond, 320x160) ===================== -->
  <!-- earth side faces -->
  <path d="M80,362 L240,442 L240,458 L80,378 Z" fill="url(#forest-windmill-earth)"/>
  <path d="M240,442 L400,362 L400,378 L240,458 Z" fill="url(#forest-windmill-earth)"/>
  <path d="M240,442 L400,362 L400,378 L240,458 Z" fill="#000000" opacity="0.22"/>
  <!-- grass top face -->
  <path d="M240,282 L400,362 L240,442 L80,362 Z" fill="url(#forest-windmill-grass)"/>
  <!-- dark lip just under the grass edge -->
  <path d="M80,362 L240,442 L400,362 L400,368 L240,448 L80,368 Z" fill="#000000" opacity="0.18"/>
  <!-- lit front-left edge / shaded front-right edge of the top face -->
  <path d="M80,362 L240,442" fill="none" stroke="#78c184" stroke-width="2.2" opacity="0.45"/>
  <path d="M240,442 L400,362" fill="none" stroke="#2e6b3d" stroke-width="2.2" opacity="0.6"/>
  <ellipse cx="216" cy="360" rx="96" ry="44" fill="#67b071" opacity="0.35"/>
  <!-- earth patch under the tower base -->
  <ellipse cx="225" cy="352" rx="104" ry="42" fill="#6a4a34" opacity="0.55"/>
  <ellipse cx="225" cy="350" rx="98" ry="38" fill="#7a5942" opacity="0.5"/>

  <!-- scattered stones / grass texture on the tile top face -->
  <g opacity="0.9">
    <ellipse cx="156" cy="394" rx="12" ry="6" fill="#546b78"/>
    <ellipse cx="154" cy="391" rx="10" ry="4.4" fill="#6b8290"/>
    <ellipse cx="330" cy="390" rx="14" ry="6.5" fill="#4c626e"/>
    <ellipse cx="328" cy="387" rx="11" ry="4.6" fill="#68808d"/>
    <ellipse cx="288" cy="408" rx="9" ry="4.4" fill="#586d5a"/>
  </g>
  <g stroke-linecap="round" fill="none">
    <path d="M126,376 q-3,-11 1,-19" stroke="#3f8a4f" stroke-width="2.6"/>
    <path d="M131,377 q1,-10 6,-16" stroke="#57a566" stroke-width="2.4"/>
    <path d="M172,400 q-3,-12 0,-20" stroke="#3f8a4f" stroke-width="2.6"/>
    <path d="M178,401 q2,-11 7,-17" stroke="#57a566" stroke-width="2.4"/>
    <path d="M316,395 q-3,-12 1,-20" stroke="#3f8a4f" stroke-width="2.6"/>
    <path d="M322,396 q2,-10 8,-16" stroke="#57a566" stroke-width="2.4"/>
    <path d="M352,378 q-2,-10 2,-17" stroke="#48945a" stroke-width="2.4"/>
    <path d="M256,412 q-2,-11 2,-18" stroke="#3f8a4f" stroke-width="2.4"/>
    <path d="M114,368 q-2,-9 2,-15" stroke="#48945a" stroke-width="2.2"/>
  </g>
  <!-- little wheat/gold flowers echoing wisps -->
  <g>
    <circle cx="140" cy="380" r="3.1" fill="#c2b280"/>
    <circle cx="140" cy="380" r="1.4" fill="#ffe9a8"/>
    <circle cx="336" cy="376" r="3" fill="#c2b280"/>
    <circle cx="336" cy="376" r="1.3" fill="#ffe9a8"/>
    <circle cx="286" cy="404" r="2.7" fill="#c2b280"/>
    <circle cx="286" cy="404" r="1.2" fill="#ffe9a8"/>
  </g>

  <!-- ===================== TOWER BODY ===================== -->
  <!-- main silhouette -->
  <path d="M130,345 L157,152 A68,27 0 0 1 293,152 L320,345 A95,38 0 0 1 130,345 Z" fill="url(#forest-windmill-tower)"/>
  <!-- warm interior wash bleeding from windows -->
  <path d="M130,345 L157,152 A68,27 0 0 1 293,152 L320,345 A95,38 0 0 1 130,345 Z" fill="url(#forest-windmill-towerwarm)"/>
  <!-- left rim light -->
  <path d="M130,345 L157,152 A68,27 0 0 1 168,150 L142,342 A95,38 0 0 0 130,345 Z" fill="#a9c0cc" opacity="0.5"/>
  <!-- right core shadow -->
  <path d="M320,345 L293,152 A68,27 0 0 1 279,153 L300,344 A95,38 0 0 1 320,345 Z" fill="#1c2932" opacity="0.55"/>
  <path d="M300,344 L279,153 A68,27 0 0 1 262,155 L280,342 A95,38 0 0 1 300,344 Z" fill="#243139" opacity="0.4"/>

  <!-- stone courses (mortar lines following the taper) -->
  <g fill="none" stroke="#20313a" stroke-width="2" opacity="0.55">
    <path d="M133.5,320 A91.5,36 0 0 0 316.5,320"/>
    <path d="M137.7,290 A87.3,34 0 0 0 312.3,290"/>
    <path d="M142.6,255 A82.4,32 0 0 0 307.4,255"/>
    <path d="M146.8,225 A78.2,30.5 0 0 0 303.2,225"/>
    <path d="M151,195 A74,29 0 0 0 299,195"/>
    <path d="M154.8,168 A70.2,27.5 0 0 0 295.2,168"/>
  </g>
  <!-- course highlight (top edge catches light) -->
  <g fill="none" stroke="#8ea4b0" stroke-width="1.1" opacity="0.4">
    <path d="M137.7,288 A87.3,34 0 0 0 250,318"/>
    <path d="M142.6,253 A82.4,32 0 0 0 250,282"/>
    <path d="M146.8,223 A78.2,30.5 0 0 0 248,250"/>
    <path d="M151,193 A74,29 0 0 0 246,220"/>
  </g>

  <!-- individual lit stones on the front-left face -->
  <g opacity="0.85">
    <path d="M150,300 l20,-2 3,15 -20,3 z" fill="#6e8592"/>
    <path d="M178,298 l24,-1 2,15 -24,2 z" fill="#637986"/>
    <path d="M155,272 l22,-2 3,14 -22,3 z" fill="#718895"/>
    <path d="M185,270 l24,-1 2,14 -24,2 z" fill="#657c89"/>
    <path d="M160,242 l22,-2 3,13 -22,2 z" fill="#6d8491"/>
    <path d="M164,214 l22,-2 3,12 -22,2 z" fill="#728a97"/>
    <path d="M168,188 l20,-1 2,11 -20,2 z" fill="#6a8290"/>
    <path d="M214,300 l22,-1 2,15 -22,1 z" fill="#4f6672"/>
    <path d="M212,272 l22,-1 2,14 -22,1 z" fill="#546b77"/>
    <path d="M209,244 l20,-1 2,13 -20,1 z" fill="#59707c"/>
  </g>
  <!-- ambient occlusion where tower meets ground -->
  <path d="M130,345 A95,38 0 0 0 320,345 A95,38 0 0 1 130,345 Z" fill="#0d1519" opacity="0.35"/>

  <!-- ===================== DOOR ===================== -->
  <g>
    <path d="M191,344 L191,308 A17,20 0 0 1 225,308 L225,344 Z" fill="#241a12"/>
    <path d="M194,344 L194,309 A14,17 0 0 1 222,309 L222,344 Z" fill="#3a2a1c"/>
