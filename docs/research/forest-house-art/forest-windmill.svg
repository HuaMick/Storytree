      <rect x="197.3" y="56" width="5.4" height="112" rx="2.4" fill="url(#forest-windmill-wood)"/>
      <circle cx="200" cy="56" r="3.4" fill="#5f3d2e"/>
      <g stroke="#7a4c37" stroke-width="1.3">
        <line x1="186" y1="76" x2="222" y2="76"/>
        <line x1="186" y1="92" x2="222" y2="92"/>
        <line x1="186" y1="108" x2="221" y2="108"/>
        <line x1="186" y1="124" x2="221" y2="124"/>
        <line x1="186" y1="140" x2="220" y2="140"/>
        <line x1="186" y1="154" x2="219" y2="154"/>
      </g>
      <line x1="203" y1="66" x2="221" y2="146" stroke="#fff2c4" stroke-width="1.2" opacity="0.5"/>
    </g>
    <!-- ARM 2 (right) -->
    <g transform="rotate(90 200 168)">
      <path d="M200,58 C214,62 223,77 223,93 L223,146 C223,157 210,164 200,165 Z" fill="url(#forest-windmill-sail)" opacity="0.5"/>
      <rect x="184" y="62" width="4" height="96" rx="2" fill="#6b4230"/>
      <rect x="197.3" y="56" width="5.4" height="112" rx="2.4" fill="url(#forest-windmill-wood)"/>
      <circle cx="200" cy="56" r="3.4" fill="#5f3d2e"/>
      <g stroke="#7a4c37" stroke-width="1.3">
        <line x1="186" y1="76" x2="222" y2="76"/>
        <line x1="186" y1="92" x2="222" y2="92"/>
        <line x1="186" y1="108" x2="221" y2="108"/>
        <line x1="186" y1="124" x2="221" y2="124"/>
        <line x1="186" y1="140" x2="220" y2="140"/>
        <line x1="186" y1="154" x2="219" y2="154"/>
      </g>
      <line x1="203" y1="66" x2="221" y2="146" stroke="#fff2c4" stroke-width="1.2" opacity="0.5"/>
    </g>
    <!-- ARM 3 (down) -->
    <g transform="rotate(180 200 168)">
      <path d="M200,58 C214,62 223,77 223,93 L223,146 C223,157 210,164 200,165 Z" fill="url(#forest-windmill-sail)" opacity="0.45"/>
      <rect x="184" y="62" width="4" height="96" rx="2" fill="#5c3928"/>
      <rect x="197.3" y="56" width="5.4" height="112" rx="2.4" fill="url(#forest-windmill-wood)"/>
      <circle cx="200" cy="56" r="3.4" fill="#5f3d2e"/>
      <g stroke="#7a4c37" stroke-width="1.3">
        <line x1="186" y1="76" x2="222" y2="76"/>
        <line x1="186" y1="92" x2="222" y2="92"/>
        <line x1="186" y1="108" x2="221" y2="108"/>
        <line x1="186" y1="124" x2="221" y2="124"/>
        <line x1="186" y1="140" x2="220" y2="140"/>
        <line x1="186" y1="154" x2="219" y2="154"/>
      </g>
      <line x1="203" y1="66" x2="221" y2="146" stroke="#fff2c4" stroke-width="1.2" opacity="0.45"/>
    </g>
    <!-- ARM 4 (left) -->
    <g transform="rotate(270 200 168)">
      <path d="M200,58 C214,62 223,77 223,93 L223,146 C223,157 210,164 200,165 Z" fill="url(#forest-windmill-sail)" opacity="0.5"/>
      <rect x="184" y="62" width="4" height="96" rx="2" fill="#6b4230"/>
      <rect x="197.3" y="56" width="5.4" height="112" rx="2.4" fill="url(#forest-windmill-wood)"/>
