      <g stroke="#7a4c37" stroke-width="1.3">
        <line x1="186" y1="76" x2="222" y2="76"/>
        <line x1="186" y1="92" x2="222" y2="92"/>
        <line x1="186" y1="108" x2="221" y2="108"/>
        <line x1="186" y1="124" x2="221" y2="124"/>
        <line x1="186" y1="140" x2="220" y2="140"/>
        <line x1="186" y1="154" x2="219" y2="154"/>
      </g>
      <line x1="203" y1="66" x2="221" y2="146" stroke="#fff2c4" stroke-width="1.2" opacity="0.5"/>
    </g>
  </g>

  <!-- windshaft mount: bracket on the cap front + timber beam anchoring the rotor to the tower -->
  <g>
    <!-- mounting bracket plate seated on the cap rim -->
    <path d="M223,150 L244,157 L240,168 L220,161 Z" fill="#3f2a1a"/>
    <path d="M223,150 L244,157 L242,161 L221.5,154 Z" fill="#6b4230" opacity="0.85"/>
    <circle cx="228" cy="156" r="1.6" fill="#241608"/>
    <circle cx="237" cy="160" r="1.6" fill="#241608"/>
    <!-- windshaft beam from cap bracket down to the hub -->
    <path d="M230.8,154.7 L233.3,163.3 L202.3,172.3 L199.8,163.7 Z" fill="url(#forest-windmill-wood)"/>
    <path d="M230,156 L201,165" stroke="#c99b6b" stroke-width="1.1" opacity="0.55"/>
    <path d="M233,162 L203,171" stroke="#3a2414" stroke-width="1" opacity="0.5"/>
  </g>
  <!-- hub -->
  <circle cx="200" cy="168" r="12" fill="url(#forest-windmill-hub)"/>
  <circle cx="200" cy="168" r="12" fill="none" stroke="#2e1c10" stroke-width="1.5"/>
  <circle cx="196" cy="164" r="3.4" fill="#e6c48f" opacity="0.8"/>
  <circle cx="200" cy="168" r="3" fill="#3a2414"/>

  <!-- ===================== MAGIC WISPS ===================== -->
  <g>
    <circle cx="360" cy="150" r="9" fill="url(#forest-windmill-mote)"/>
