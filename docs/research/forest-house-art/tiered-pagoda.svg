    <circle cx="304" cy="167.5" r="1.2" fill="#8a5a44"/>
    <circle cx="304" cy="165.5" r="4.5" fill="url(#tp-glow)" opacity="0.7"/>
    <line x1="176" y1="153" x2="176" y2="160" stroke="#8a5a44" stroke-width="1.3"/>
    <path d="M173,165.5 q0,-5 3,-5 q3,0 3,5 z" fill="url(#tp-bell)"/>
    <circle cx="176" cy="167.5" r="1.2" fill="#8a5a44"/>
    <circle cx="176" cy="165.5" r="4.5" fill="url(#tp-glow)" opacity="0.55"/>
    <line x1="240" y1="185" x2="240" y2="192" stroke="#8a5a44" stroke-width="1.3"/>
    <path d="M237,197.5 q0,-5 3,-5 q3,0 3,5 z" fill="url(#tp-bell)"/>
    <circle cx="240" cy="199.5" r="1.2" fill="#8a5a44"/>
    <circle cx="240" cy="197.5" r="4.5" fill="url(#tp-glow)" opacity="0.6"/>
  </g>

  <!-- ============ FINIAL / SORIN ============ -->
  <line x1="240" y1="126" x2="240" y2="98" stroke="#8a5a44" stroke-width="2.4"/>
  <line x1="240" y1="126" x2="240" y2="98" stroke="#e0b784" stroke-width="0.8" opacity="0.6"/>
  <!-- stacked sorin rings: 2:1 iso disks, matching the roof projection -->
  <ellipse cx="240" cy="122" rx="7" ry="3.5" fill="url(#tp-bell)"/>
