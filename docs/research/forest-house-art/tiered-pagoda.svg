<svg viewBox="0 0 480 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- ambient sky lift -->
    <radialGradient id="tp-sky" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#2a4b5a" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#1a2f3a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#101418" stop-opacity="0"/>
    </radialGradient>
    <!-- grass -->
    <radialGradient id="tp-grass-top" cx="46%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#5eb26e"/>
      <stop offset="60%" stop-color="#4f9d5d"/>
      <stop offset="100%" stop-color="#377a48"/>
    </radialGradient>
    <linearGradient id="tp-grass-rf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#356b41"/>
      <stop offset="100%" stop-color="#234d2d"/>
    </linearGradient>
    <linearGradient id="tp-grass-lf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b5c37"/>
      <stop offset="100%" stop-color="#1c4325"/>
    </linearGradient>
    <!-- stone platform -->
    <linearGradient id="tp-stone-top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#84a0ad"/>
      <stop offset="100%" stop-color="#5c7581"/>
    </linearGradient>
    <linearGradient id="tp-stone-rf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#54707c"/>
      <stop offset="100%" stop-color="#3b525c"/>
    </linearGradient>
    <linearGradient id="tp-stone-lf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#405661"/>
      <stop offset="100%" stop-color="#2c3e47"/>
    </linearGradient>
    <!-- walls -->
    <linearGradient id="tp-wall-top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d3ac7b"/>
      <stop offset="100%" stop-color="#a37f4f"/>
    </linearGradient>
    <linearGradient id="tp-wall-rf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c39264"/>
      <stop offset="100%" stop-color="#8a5a3f"/>
    </linearGradient>
    <linearGradient id="tp-wall-lf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#714936"/>
      <stop offset="100%" stop-color="#4f2f24"/>
    </linearGradient>
    <!-- roofs -->
    <linearGradient id="tp-roof-rf" x1="0.15" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#8cc0d3"/>
      <stop offset="55%" stop-color="#5d8fa8"/>
      <stop offset="100%" stop-color="#436f85"/>
    </linearGradient>
    <linearGradient id="tp-roof-lf" x1="0.85" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#477089"/>
      <stop offset="100%" stop-color="#2d4d5e"/>
    </linearGradient>
    <linearGradient id="tp-roof-under" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#28434f"/>
      <stop offset="100%" stop-color="#182e38"/>
    </linearGradient>
    <!-- warm light -->
    <radialGradient id="tp-window" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#fff6d2"/>
      <stop offset="55%" stop-color="#ffd75e"/>
      <stop offset="100%" stop-color="#d1913a"/>
    </radialGradient>
    <radialGradient id="tp-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe9a8" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#ffd75e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffd75e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tp-orb" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#fffdf0"/>
      <stop offset="40%" stop-color="#ffe9a8"/>
      <stop offset="75%" stop-color="#ffd75e" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffd75e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tp-bell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe6a0"/>
      <stop offset="100%" stop-color="#c8962f"/>
    </linearGradient>
    <filter id="tp-blur-s" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="tp-blur-m" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="7"/></filter>
    <filter id="tp-blur-l" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="15"/></filter>
  </defs>

  <!-- ambient glow behind pagoda -->
  <ellipse cx="240" cy="248" rx="185" ry="205" fill="url(#tp-sky)"/>

  <!-- ground contact shadow -->
  <ellipse cx="240" cy="432" rx="152" ry="34" fill="#05080a" opacity="0.55" filter="url(#tp-blur-l)"/>

  <!-- back wisps (behind house) -->
  <g opacity="0.85">
    <circle cx="126" cy="252" r="20" fill="url(#tp-glow)" filter="url(#tp-blur-m)"/>
    <circle cx="126" cy="252" r="2.4" fill="#fff4c8"/>
    <circle cx="356" cy="236" r="17" fill="url(#tp-glow)" filter="url(#tp-blur-m)"/>
    <circle cx="356" cy="236" r="2.1" fill="#fff4c8"/>
    <circle cx="206" cy="118" r="15" fill="url(#tp-glow)" filter="url(#tp-blur-m)"/>
    <circle cx="206" cy="118" r="1.9" fill="#fff4c8"/>
  </g>

  <!-- ============ GROUND TILE ============ -->
  <!-- slab side faces (thickness) -->
  <polygon points="386,372 240,442 240,458 386,388" fill="url(#tp-grass-rf)"/>
  <polygon points="94,372 240,442 240,458 94,388" fill="url(#tp-grass-lf)"/>
  <!-- grass top -->
  <polygon points="240,302 386,372 240,442 94,372" fill="url(#tp-grass-top)"/>
  <!-- top edge highlight -->
  <polyline points="94,372 240,302 386,372" fill="none" stroke="#7cc389" stroke-width="1.6" opacity="0.55"/>
  <!-- subtle inner terrace ring -->
  <polygon points="240,326 352,372 240,418 128,372" fill="none" stroke="#3c7d4c" stroke-width="1" opacity="0.5"/>
  <!-- little stones and flowers on the lawn (all seated on the diamond plane) -->
  <ellipse cx="150" cy="392" rx="7" ry="3.4" fill="#5c7581" opacity="0.8"/>
  <ellipse cx="150" cy="391" rx="5" ry="2.2" fill="#7f98a4" opacity="0.8"/>
  <ellipse cx="330" cy="396" rx="8" ry="3.8" fill="#5c7581" opacity="0.8"/>
  <ellipse cx="330" cy="395" rx="5.5" ry="2.4" fill="#7f98a4" opacity="0.8"/>
  <circle cx="186" cy="410" r="2.2" fill="#ffe9a8"/>
  <circle cx="300" cy="412" r="2" fill="#ffd75e"/>
  <circle cx="214" cy="424" r="1.8" fill="#fff4c8"/>
  <path d="M156,396 q3,-8 6,0" fill="none" stroke="#377a48" stroke-width="1.4"/>
  <path d="M312,402 q3,-9 6,0" fill="none" stroke="#377a48" stroke-width="1.4"/>

  <!-- ============ HOUSE (seated: translated to plant the plinth footprint on the tile plane) ============ -->
  <g transform="translate(0,6)">
  <!-- ============ STONE PLATFORM ============ -->
  <polygon points="336,344 240,392 240,414 336,366" fill="url(#tp-stone-rf)"/>
  <polygon points="144,344 240,392 240,414 144,366" fill="url(#tp-stone-lf)"/>
  <polygon points="240,296 336,344 240,392 144,344" fill="url(#tp-stone-top)"/>
  <polyline points="144,344 240,296 336,344" fill="none" stroke="#9ab3bf" stroke-width="1.2" opacity="0.6"/>
  <!-- stone seams -->
  <line x1="288" y1="320" x2="192" y2="368" stroke="#455d67" stroke-width="0.8" opacity="0.5"/>
  <line x1="240" y1="392" x2="240" y2="414" stroke="#26343b" stroke-width="1"/>
  <!-- entrance steps: two nested corner slabs descending to the lawn (treads + both riser faces) -->
  <ellipse cx="240" cy="428" rx="27" ry="8" fill="#05080a" opacity="0.4" filter="url(#tp-blur-s)"/>
  <!-- lower slab -->
  <polygon points="240,400 262,411 240,422 218,411" fill="#7f9aa7"/>
  <polygon points="262,411 240,422 240,428 262,417" fill="#64808c"/>
  <polygon points="218,411 240,422 240,428 218,417" fill="#3c515a"/>
  <!-- upper slab -->
  <polygon points="240,393 254,400 240,407 226,400" fill="#8aa5b2"/>
  <polygon points="254,400 240,407 240,414 254,407" fill="#6e8792"/>
  <polygon points="226,400 240,407 240,414 226,407" fill="#435963"/>

  <!-- ============ TIER 1 WALLS ============ -->
  <polygon points="312,300 240,336 240,382 312,346" fill="url(#tp-wall-rf)"/>
  <polygon points="168,300 240,336 240,382 168,346" fill="url(#tp-wall-lf)"/>
  <polygon points="240,264 312,300 240,336 168,300" fill="url(#tp-wall-top)"/>
  <!-- corner post + rim light -->
  <line x1="240" y1="336" x2="240" y2="382" stroke="#3c2519" stroke-width="2"/>
  <line x1="168" y1="300" x2="168" y2="346" stroke="#8f6b4f" stroke-width="1.4" opacity="0.5"/>
  <line x1="312" y1="300" x2="312" y2="346" stroke="#e0b784" stroke-width="1.2" opacity="0.6"/>
